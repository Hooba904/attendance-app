<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الحضور الذكية</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">

    <style>
        :root {
            --primary: #2563eb; --primary-light: #dbeafe; --secondary: #64748b;
            --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg);
            margin: 0; padding: 20px; display: flex; justify-content: center; direction: rtl;
        }

        .container {
            width: 100%; max-width: 480px; background: var(--card);
            padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        header { text-align: center; margin-bottom: 25px; }
        header h2 { margin: 0; color: var(--primary); font-size: 1.4rem; }

        .section-card {
            background: #f8fafc; padding: 15px; border-radius: 16px;
            margin-bottom: 15px; border: 1px solid #e2e8f0;
        }

        label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-weight: 600; font-size: 0.9rem; }

        input, select {
            width: 100%; padding: 12px; border: 1.5px solid #cbd5e1;
            border-radius: 12px; font-family: inherit; font-size: 1rem;
            box-sizing: border-box; outline: none; background: white !important;
        }

        .btn-add {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 12px; border-radius: 12px; cursor: pointer; margin-top: 10px; font-weight: bold;
        }

        .btn-calculate {
            width: 100%; background: var(--success); color: white; border: none;
            padding: 16px; border-radius: 16px; font-size: 1.1rem; font-weight: bold; margin-top: 10px;
        }

        .holiday-tag {
            display: inline-block; background: white; padding: 5px 10px;
            border-radius: 8px; font-size: 0.8rem; border: 1px solid #e2e8f0; margin: 3px;
        }

        .result-box {
            margin-top: 25px; padding: 15px; border-radius: 15px;
            background: var(--primary-light); border: 1px solid #bfdbfe;
        }

        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; }
        
        /* إجبار التقويم على اليمين دائماً */
        .flatpickr-calendar { direction: rtl !important; }
        /* منع ظهور الكيبورد على الموبايل عند اختيار التاريخ */
        .flatpickr-input[readonly] { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📅 حاسبة الحضور الذكية</h2>
    </header>
    
    <div class="section-card">
        <label>🗓️ اختر الشهر والسنة:</label>
        <input type="text" id="monthPicker" readonly placeholder="جاري التحميل...">
    </div>

    <div class="section-card">
        <label>🛋️ يوم الراحة الإضافي:</label>
        <select id="restDay">
            <option value="6">السبت</option>
            <option value="0">الأحد</option>
            <option value="1">الاثنين</option>
            <option value="2">الثلاثاء</option>
            <option value="3">الأربعاء</option>
            <option value="4">الخميس</option>
            <option value="none">الجمعة فقط</option>
        </select>
    </div>

    <div class="section-card">
        <div style="display:flex; justify-content:space-between;">
            <label>🎉 العطلات الرسمية:</label>
            <button style="border:none; color:var(--danger); background:none; cursor:pointer; font-size:0.8rem;" onclick="clearHolidays()">مسح 🗑️</button>
        </div>
        <input type="text" id="multiHolidayPicker" readonly placeholder="اختر أيام العطلات...">
        <button class="btn-add" onclick="addSelectedHolidays()">تثبيت الأيام المختارة ✅</button>
        <div id="holidayList" style="margin-top:10px;"></div>
    </div>

    <div class="section-card">
        <label>🤒 إجازات خاصة (أرقام):</label>
        <input type="number" id="manualLeaves" min="0" value="0">
    </div>

    <button class="btn-calculate" onclick="calculateAttendance()">📊 استخراج التقرير</button>

    <div id="result" class="result-box" style="display:none;">
        <div class="result-item"><span>📏 أيام الشهر:</span> <span id="resTotal"></span></div>
        <div class="result-item"><span>⛱️ الجمعة والراحة:</span> <span id="resWeekends"></span></div>
        <div class="result-item"><span>🏛️ عطلات رسمية:</span> <span id="resHolidays"></span></div>
        <div class="result-item"><span>🔓 إجازات خاصة:</span> <span id="resManual"></span></div>
        <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--primary); font-size:1.1rem;">
            <span>✅ صافي الحضور:</span> <span id="resFinal"></span>
        </div>
    </div>
</div>

<script>
    let holidayDates = new Set();
    let fpMain, fpDays;
    const monthsAr = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

    window.onload = function() {
        const ar = flatpickr.l10ns.ar;
        ar.firstDayOfWeek = 6;

        // تهيئة اختيار الشهر (فقط شهر وسنة)
        fpMain = flatpickr("#monthPicker", {
            locale: ar,
            disableMobile: true, // يمنع واجهة الموبايل الافتراضية
            plugins: [
                new monthSelectPlugin({
                    shorthand: true,
                    dateFormat: "Y-m",
                    altInput: true,
                    altFormat: "F Y"
                })
            ],
            defaultDate: new Date(),
            onChange: () => initCalendar()
        });

        initCalendar();
    };

    function initCalendar() {
        if (fpDays) { fpDays.destroy(); holidayDates.clear(); renderHolidays(); }
        
        const monthVal = document.getElementById('monthPicker').value;
        const [year, month] = monthVal.split('-').map(Number);
        const firstDay = `${year}-${String(month).padStart(2, '0')}-01`;
        const lastDay = `${year}-${String(month).padStart(2, '0')}-${new Date(year, month, 0).getDate()}`;

        const ar = flatpickr.l10ns.ar;
        ar.firstDayOfWeek = 6;

        fpDays = flatpickr("#multiHolidayPicker", {
            mode: "multiple",
            locale: ar,
            disableMobile: true, // يمنع واجهة الموبايل الافتراضية لضمان ظهور السبت يميناً
            minDate: firstDay,
            maxDate: lastDay,
            dateFormat: "Y-m-d",
            onReady: (s, d, instance) => instance.jumpToDate(firstDay)
        });
        document.getElementById('result').style.display = 'none';
    }

    function addSelectedHolidays() {
        if (!fpDays || fpDays.selectedDates.length === 0) return;
        fpDays.selectedDates.forEach(date => {
            const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            holidayDates.add(dateStr);
        });
        renderHolidays();
        fpDays.clear();
    }

    function renderHolidays() {
        const container = document.getElementById('holidayList');
        container.innerHTML = '';
        Array.from(holidayDates).sort().forEach(dateStr => {
            const d = new Date(dateStr);
            const span = document.createElement('span');
            span.className = 'holiday-tag';
            span.innerText = `📍 ${d.getDate()} ${monthsAr[d.getMonth()]}`;
            container.appendChild(span);
        });
    }

    function clearHolidays() { holidayDates.clear(); if(fpDays) fpDays.clear(); renderHolidays(); }
    
    function calculateAttendance() {
        const monthVal = document.getElementById('monthPicker').value;
        const restDay = document.getElementById('restDay').value;
        const manual = parseInt(document.getElementById('manualLeaves').value) || 0;
        const [year, month] = monthVal.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        let weekends = 0, holidays = 0;
        for (let d = 1; d <= daysInMonth; d++) {
            const date = new Date(year, month - 1, d);
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            if (date.getDay() === 5 || (restDay !== "none" && date.getDay() === parseInt(restDay))) weekends++;
            else if (holidayDates.has(dateStr)) holidays++;
        }

        const final = daysInMonth - weekends - holidays - manual;
        document.getElementById('resTotal').innerText = daysInMonth + " يوم";
        document.getElementById('resWeekends').innerText = weekends + " يوم";
        document.getElementById('resHolidays').innerText = holidays + " يوم";
        document.getElementById('resManual').innerText = manual + " يوم";
        document.getElementById('resFinal').innerText = Math.max(0, final) + " يوم عمل";
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
