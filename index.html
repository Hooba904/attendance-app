<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الحضور الذكية</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ar.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--text-dark);
            direction: rtl;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        header { text-align: center; margin-bottom: 30px; }
        header h2 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        header p { color: var(--secondary); font-size: 0.9rem; margin-top: 5px; }

        .section-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn-clear {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .btn-add {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn-calculate {
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .holiday-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .holiday-tag {
            background: white;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            border: 1px solid #e2e8f0;
            color: var(--primary);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 20px;
            background: var(--primary-light);
            border: 1px solid #bfdbfe;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.1);
        }

        .total-row { border-bottom: none; font-weight: 800; color: var(--primary); font-size: 1.2rem; }

        /* ضمان توجيه التقويم من اليمين لليسار */
        .flatpickr-calendar {
            direction: rtl !important;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📅 حاسبة الحضور الذكية</h2>
        <p></p>
    </header>
    
    <div class="section-card">
        <div class="form-group">
            <label>🗓️ اختر الشهر والسنة:</label>
            <input type="month" id="monthPicker" onchange="initCalendar()">
        </div>
        <div class="form-group" style="margin-top:15px;">
            <label>🛋️ اختر يوم الراحة:</label>
            <select id="restDay">
                <option value="6">السبت</option>
                <option value="0">الأحد</option>
                <option value="1">الاثنين</option>
                <option value="2">الثلاثاء</option>
                <option value="3">الأربعاء</option>
                <option value="4">الخميس</option>
                <option value="none">الجمعة فقط</option>
            </select>
        </div>
    </div>

    <div class="section-card">
        <div class="header-actions">
            <label style="margin:0;">🎉 حدد أيام العطلات الرسمية:</label>
            <button class="btn-clear" onclick="clearHolidays()">مسح 🗑️</button>
        </div>
        <input type="text" id="multiHolidayPicker" placeholder="انقر لتحديد أيام العطلات...">
        <button class="btn-add" onclick="addSelectedHolidays()">إضافة الأيام المحددة</button>
        <div id="holidayList" class="holiday-list"></div>
    </div>

    <div class="section-card">
        <div class="header-actions">
            <label style="margin:0;">🤒 إجازات خاصة ( إعتيادى / عارضة ):</label>
            <button class="btn-clear" onclick="clearManualLeaves()">مسح 🗑️</button>
        </div>
        <input type="number" id="manualLeaves" min="0" value="0">
    </div>

    <button class="btn-calculate" onclick="calculateAttendance()">احسب أيام الحضور</button>

    <div id="result" class="result-box" style="display:none;">
        <div class="result-item"><span>🗓️ أيام الشهر:</span> <span id="resTotal"></span></div>
        <div class="result-item"><span>⛱️ الجمعة والراحة:</span> <span id="resWeekends"></span></div>
        <div class="result-item"><span>🏛️ عطلات رسمية:</span> <span id="resHolidays"></span></div>
        <div class="result-item"><span>🔓 إجازات خاصة:</span> <span id="resManual"></span></div>
        <div class="result-item total-row"><span>✅ أيام الحضور:</span> <span id="resFinal"></span></div>
    </div>
</div>

<script>
    let holidayDates = new Set();
    let fp = null;
    const daysAr = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
    const monthsAr = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

    window.onload = function() {
        const now = new Date();
        const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('monthPicker').value = currentMonth;
        initCalendar();
    };

    function initCalendar() {
        if (fp) { fp.destroy(); holidayDates.clear(); renderHolidays(); }
        const monthVal = document.getElementById('monthPicker').value;
        if (!monthVal) return;
        const [year, month] = monthVal.split('-').map(Number);
        const firstDay = `${year}-${String(month).padStart(2, '0')}-01`;
        const lastDay = `${year}-${String(month).padStart(2, '0')}-${new Date(year, month, 0).getDate()}`;

        // تعديل مهم: تعريف إعدادات اللغة العربية مع إجبار السبت كبداية للأسبوع
        const customAr = flatpickr.l10ns.ar;
        customAr.firstDayOfWeek = 6; // السبت

        fp = flatpickr("#multiHolidayPicker", {
            mode: "multiple", 
            dateFormat: "Y-m-d", 
            locale: customAr, // استخدام الإعداد المعدل
            minDate: firstDay, 
            maxDate: lastDay, 
            disableMobile: "true",
            onReady: function(s, d, instance) { instance.jumpToDate(firstDay); }
        });
        document.getElementById('result').style.display = 'none';
    }

    function addSelectedHolidays() {
        if (!fp || fp.selectedDates.length === 0) return;
        fp.selectedDates.forEach(date => {
            const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            holidayDates.add(dateStr);
        });
        renderHolidays();
        fp.clear(); 
    }

    function clearHolidays() { holidayDates.clear(); if(fp) fp.clear(); renderHolidays(); document.getElementById('result').style.display = 'none'; }
    function clearManualLeaves() { document.getElementById('manualLeaves').value = 0; document.getElementById('result').style.display = 'none'; }

    function renderHolidays() {
        const container = document.getElementById('holidayList');
        container.innerHTML = '';
        Array.from(holidayDates).sort().forEach(dateStr => {
            const d = new Date(dateStr);
            const span = document.createElement('span');
            span.className = 'holiday-tag';
            span.innerText = `📍 ${d.getDate()} ${monthsAr[d.getMonth()]}`;
            container.appendChild(span);
        });
    }

    function calculateAttendance() {
        const monthVal = document.getElementById('monthPicker').value;
        const restDay = document.getElementById('restDay').value;
        const manualLeaves = parseInt(document.getElementById('manualLeaves').value) || 0;
        const [year, month] = monthVal.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        let weekendCount = 0, officialHolidaysCount = 0;

        for (let d = 1; d <= daysInMonth; d++) {
            const date = new Date(year, month - 1, d);
            const dayOfWeek = date.getDay();
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            if (dayOfWeek === 5 || (restDay !== "none" && dayOfWeek === parseInt(restDay))) weekendCount++;
            else if (holidayDates.has(dateStr)) officialHolidaysCount++;
        }

        const finalDays = daysInMonth - weekendCount - officialHolidaysCount - manualLeaves;
        document.getElementById('resTotal').innerText = daysInMonth + " يوم";
        document.getElementById('resWeekends').innerText = weekendCount + " يوم";
        document.getElementById('resHolidays').innerText = officialHolidaysCount + " يوم";
        document.getElementById('resManual').innerText = manualLeaves + " يوم";
        document.getElementById('resFinal').innerText = Math.max(0, finalDays) + " يوم عمل";
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
